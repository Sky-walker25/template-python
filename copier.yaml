_subdirectory: template
_jinja_extensions:
    - copier_templates_extensions.TemplateExtensionLoader
    - extensions.py:PackageNameFilter
    - extensions.py:GitContext
_exclude:
    - extensions.py

project_name:
    type: str
    help: Project name?
    default: "{{ dst_folder_name }}"

package_name:
    type: str
    help: Python package name (valid PEP 508 identifier)?
    default: "{{ project_name | to_package_name }}"

description:
    type: str
    help: Project description?

author_name:
    type: str
    help: Author name?
    default: "{{ git_user_name }}"


author_email:
    type: str
    help: Author email?
    default: "{{ git_user_email }}"

_tasks:
    # Initialize git repository and make initial commit
    - ["git", "init"]
    # Ignore file-mode (chmod) bits, which differ between Windows and Unix and
    # otherwise show up as spurious diffs for cross-platform contributors.
    - ["git", "config", "core.filemode", "false"]
    - ["git", "add", "."]
    - ["git", "commit", "-m", "chore(repo): Setup project structure"]
